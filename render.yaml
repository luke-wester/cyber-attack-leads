services:
  - type: web
    name: cyber-attack-leads
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    autoDeployTrigger: commit
    envVars:
      - key: SERPAPI_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
