services:
  - type: web
    name: cyber-attack-leads
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    autoDeployTrigger: commit
    healthCheckPath: /healthz
    envVars:
      - key: SERPAPI_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
